<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <!-- maximum-scale=1/user-scalable=no (2026-07-21) — без этого случайный pinch/double-tap
         во время скролла формы зумит и панорамирует ВСЮ страницу (не только модалку), что
         выглядело как "диагональный скролл" и обрезанные поля по краям (репорт Александра,
         видео). Внутренний рабочий инструмент, не публичный контент — фиксированный масштаб
         приемлем (см. CLAUDE.md "любая обезьяна должна справиться", тач и так уже
         touch-pan-y-locked на модалках отдельно). -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>oinarri</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Geist Mono сознательно не подключён — --font-mono-premium в index.css пока нигде
         не используется (следующая фаза редизайна), не тратим лишний запрос на неиспользуемый
         шрифт. Fraunces — 500 (обычный) и 600 (font-semibold) для italic, оба веса реально
         применяются в Brand/StatWidget/DashboardPage. -->
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;1,9..144,500;1,9..144,600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
